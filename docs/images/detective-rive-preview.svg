<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Detective Rive element preview</title>
  <desc id="desc">A detective magnifier hovering over a minimal Dock bar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="0.55" stop-color="#1f2a30"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <ellipse cx="600" cy="232" rx="330" ry="118" fill="#5db7d1" opacity=".16" filter="url(#soft)"/>
  <g transform="translate(0 4)">
    <rect x="318" y="286" width="564" height="82" rx="41" fill="#e9eef2" opacity=".88"/>
    <rect x="378" y="306" width="48" height="48" rx="13" fill="#4f8ff7"/>
    <rect x="466" y="306" width="48" height="48" rx="13" fill="#5dd07e"/>
    <rect x="554" y="306" width="48" height="48" rx="13" fill="#ffc34d"/>
    <rect x="642" y="306" width="48" height="48" rx="13" fill="#f96c5b"/>
    <rect x="730" y="306" width="48" height="48" rx="13" fill="#8d7cf6"/>
  </g>
  <g transform="translate(600 176)">
    <circle r="96" fill="#dff4fa" opacity=".96"/>
    <circle r="70" fill="#a9d8e6" opacity=".75" stroke="#365a66" stroke-width="8"/>
    <rect x="-86" y="-86" width="172" height="42" rx="21" fill="#202832"/>
    <rect x="-48" y="-154" width="96" height="82" rx="22" fill="#202832"/>
    <path d="M-34-98H34" stroke="#edf4f7" stroke-width="8"/>
    <rect x="83" y="64" width="82" height="176" rx="36" fill="#edf4f7" stroke="#404a55" stroke-width="8" transform="rotate(-42 124 152)"/>
  </g>
  <g transform="translate(835 118)" fill="none" stroke="#ffc44e" stroke-width="8" stroke-linecap="round">
    <path d="M0-34V34"/>
    <path d="M-34 0H34"/>
    <circle r="13" fill="#ffc44e" stroke="none"/>
  </g>
  <text x="600" y="72" text-anchor="middle" fill="#edf4f7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">Detective Dock Watch</text>
  <text x="600" y="110" text-anchor="middle" fill="#aeb8bf" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">A Rive-ready README element for the MoreDock project identity</text>
</svg>
