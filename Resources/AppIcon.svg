<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoreDock detective app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B3B7A"/>
      <stop offset="0.55" stop-color="#232346"/>
      <stop offset="1" stop-color="#14142B"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#DCE6FF" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#8FA6E8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2A2A55" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D488"/>
      <stop offset="0.5" stop-color="#C99A3E"/>
      <stop offset="1" stop-color="#8A5E1F"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20233A"/>
      <stop offset="1" stop-color="#0C0D1A"/>
    </linearGradient>
  </defs>

  <!-- App icon glass base -->
  <rect x="112" y="112" width="800" height="800" rx="184" fill="url(#bg)"/>
  <rect x="112" y="112" width="800" height="800" rx="184" fill="url(#sheen)"/>
  <rect x="120.5" y="120.5" width="783" height="783" rx="176" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3"/>

  <!-- Magnifying glass handle -->
  <g transform="rotate(35 512 512)">
    <rect x="486" y="612" width="52" height="250" rx="26" fill="url(#metal)" stroke="#5C3E14" stroke-width="4"/>
  </g>

  <!-- Lens ring -->
  <circle cx="452" cy="452" r="212" fill="url(#lens)"/>
  <circle cx="452" cy="452" r="212" fill="none" stroke="url(#metal)" stroke-width="44"/>
  <circle cx="452" cy="452" r="234" fill="none" stroke="#5C3E14" stroke-opacity="0.5" stroke-width="4"/>
  <circle cx="452" cy="452" r="190" fill="none" stroke="#0C0D1A" stroke-opacity="0.35" stroke-width="4"/>

  <!-- Mini dock revealed inside the lens -->
  <g>
    <rect x="330" y="500" width="244" height="70" rx="35" fill="#0E1024" fill-opacity="0.62"/>
    <rect x="330.5" y="500.5" width="243" height="69" rx="34.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="3"/>
    <circle cx="372" cy="535" r="20" fill="#6EA8FE"/>
    <circle cx="422" cy="535" r="20" fill="#7BE0C0"/>
    <circle cx="472" cy="535" r="20" fill="#F6C177"/>
    <circle cx="522" cy="535" r="20" fill="#E88FB8"/>
  </g>

  <!-- Lens highlight -->
  <path d="M 352 372 A 150 150 0 0 1 470 320" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="16" stroke-linecap="round"/>

  <!-- Detective fedora resting on the lens -->
  <g transform="rotate(-9 452 300)">
    <ellipse cx="452" cy="322" rx="196" ry="38" fill="url(#hat)"/>
    <ellipse cx="452" cy="316" rx="196" ry="34" fill="#171A2E"/>
    <path d="M 320 314 C 322 224 356 196 452 196 C 548 196 582 224 584 314 C 540 296 500 288 452 288 C 404 288 364 296 320 314 Z" fill="url(#hat)"/>
    <path d="M 320 312 C 372 300 532 300 584 312" fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="6"/>
    <rect x="322" y="300" width="260" height="20" rx="10" fill="#0A0B16"/>
  </g>
</svg>
