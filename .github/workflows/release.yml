name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "${name} is required for signed releases" >&2
              exit 1
            fi
          done

          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/moredock-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "${APPLE_CERTIFICATE}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Package app
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}" ./scripts/package_release.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.dmg
            dist/SHA256SUMS.txt
          generate_release_notes: true
